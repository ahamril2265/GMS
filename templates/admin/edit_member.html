{% extends "admin/base.html" %}

{% block title %}Edit Member - GymTrack Admin{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Edit Member</h1>
    <a href="{{ url_for('admin.members') }}" class="btn btn-secondary">Back to Members</a>
</div>

<div class="card">
    <form method="POST" action="{{ url_for('admin.edit_member', member_id=member.id) }}" class="member-form">
        <div class="form-group">
            <label>Admission Number</label>
            <input 
                type="text" 
                value="{{ member.admission_number }}" 
                disabled
                class="disabled-input"
            >
            <small class="form-text">Admission number cannot be changed</small>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="name">Full Name *</label>
                <input 
                    type="text" 
                    id="name" 
                    name="name" 
                    value="{{ member.name }}"
                    required
                >
            </div>
            
            <div class="form-group">
                <label for="email">Email *</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    value="{{ member.email }}"
                    required
                >
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="mobile_number">Mobile Number</label>
                <input 
                    type="tel" 
                    id="mobile_number" 
                    name="mobile_number" 
                    value="{{ member.mobile_number or '' }}"
                    placeholder="+1234567890"
                >
            </div>
            
            <div class="form-group">
                <label for="date_of_birth">Date of Birth</label>
                <input 
                    type="date" 
                    id="date_of_birth" 
                    name="date_of_birth"
                    value="{{ member.date_of_birth or '' }}"
                >
            </div>
            
            <div class="form-group">
                <label for="sex">Sex</label>
                <select id="sex" name="sex">
                    <option value="">Select</option>
                    <option value="Male" {% if member.sex == 'Male' %}selected{% endif %}>Male</option>
                    <option value="Female" {% if member.sex == 'Female' %}selected{% endif %}>Female</option>
                    <option value="Other" {% if member.sex == 'Other' %}selected{% endif %}>Other</option>
                </select>
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="plan_type">Plan Type *</label>
                <select id="plan_type" name="plan_type" required>
                    <option value="1 Day Pass" {% if member.plan_type == '1 Day Pass' %}selected{% endif %}>1 Day Pass</option>
                    <option value="Monthly" {% if member.plan_type == 'Monthly' %}selected{% endif %}>Monthly</option>
                    <option value="3 Months" {% if member.plan_type == '3 Months' %}selected{% endif %}>3 Months</option>
                    <option value="6 Months" {% if member.plan_type == '6 Months' %}selected{% endif %}>6 Months</option>
                    <option value="12 Months" {% if member.plan_type == '12 Months' %}selected{% endif %}>12 Months</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="access_type">Access Type *</label>
                <select id="access_type" name="access_type" required>
                    <option value="One-time" {% if member.access_type == 'One-time' %}selected{% endif %}>One-time</option>
                    <option value="Multiple" {% if member.access_type == 'Multiple' %}selected{% endif %}>Multiple</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="start_date">Start Date *</label>
                <input 
                    type="date" 
                    id="start_date" 
                    name="start_date" 
                    value="{{ member.start_date }}"
                    required
                >
            </div>
        </div>
        
        <div class="form-group">
            <label class="toggle-label">
                <input 
                    type="checkbox" 
                    id="email_notifications" 
                    name="email_notifications" 
                    {% if member.email_notifications_enabled %}checked{% endif %}
                >
                <span>Enable email notifications for check-in/out</span>
            </label>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Update Member</button>
            <a href="{{ url_for('admin.members') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
